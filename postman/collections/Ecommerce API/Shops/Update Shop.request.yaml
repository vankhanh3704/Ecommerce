$kind: http-request
description: Update an existing shop
url: "{{baseUrl}}/api/shops/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: id
    value: "1"
    description: Shop ID
body:
  type: text
  content: |-
    {
        "shopName": "",
        "description": "",
        "phoneNumber": "",
        "email": "",
        "address": "",
        "isActive": true
    }
order: 5000
