$kind: http-request
description: Update an existing shop location
url: "{{baseUrl}}/api/shop-locations/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: id
    value: "1"
    description: Shop Location ID
body:
  type: text
  content: |-
    {
        "contactName": "",
        "phoneNumber": "",
        "street": "",
        "ward": "",
        "district": "",
        "city": "",
        "country": "",
        "postalCode": "",
        "isDefaultPickup": false,
        "isDefaultReturn": false,
        "isActive": true,
        "locationName": "",
        "note": ""
    }
order: 4000
